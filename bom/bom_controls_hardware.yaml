#
# SCOPE:
#   Beckhoff / TwinCAT control system hardware.
#   Includes: Beckhoff IPC or CX series controller (TwinCAT 3 runtime), EK1100 EtherCAT coupler,
#            EL1008 digital input, EL2008 digital output, EL3314 thermocouple input (4ch),
#            EL3204 RTD input, EL4004 analogue output, AX5101 servo drive (for AM8012),
#            DIN rail, terminal end clamps, power supply (24 VDC).
#   TwinCAT 3 XAE/XAR license: check runtime level required for NC PTP axis.
#   Cross-ref bom_motion_control.yaml (AX5101 + AM8012) and bom_drivetrain.yaml (VFD fieldbus).
#
# =============================================================================

