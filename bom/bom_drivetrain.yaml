#
# SCOPE:
#   All components in the power transmission chain from supply to compressor shaft.
#   Includes: main drive motor (induction or PM, ~350–400 kW class), VFD / frequency converter,
#            flexible coupling (e.g. disc-pack or jaw type), coupling guard.
#   Motor and VFD must be specified together — check torque-speed envelope and thermal derating.
#   EtherCAT / TwinCAT integration: VFD fieldbus option must match AX5101 or separate IPC I/O.
#   Cross-ref bom_controls_hardware.yaml for fieldbus terminals.
#
# =============================================================================

